name: publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm OIDC (Trusted Publishers)
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build and test
        run: yarn ci

      - name: Debug OIDC environment
        run: |
          echo "npm version: $(npm --version)"
          echo "OIDC URL set: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes (present)}"
          echo "OIDC TOKEN set: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+yes (present)}"
          npm config list --json | grep -E "registry|_authToken" || true

      - name: Publish to npm
        run: npm publish --provenance --access public
